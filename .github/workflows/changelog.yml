name: Generate Changelog

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  changelog:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: main

      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --verbose
        env:
          OUTPUT: CHANGELOG.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Prepare changelog branch
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git checkout -B chore/changelog
          git add CHANGELOG.md
          git commit -m "Update changelog" || exit 0

      - name: Force push changelog branch
        run: git push origin HEAD:chore/changelog --force

      - name: Create pull request
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          branch: chore/changelog
          base: main
          title: "Update changelog"
          body: "Automated changelog update for the latest release."
          labels: changelog
          delete-branch: true
